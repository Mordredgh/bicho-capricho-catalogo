server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 512;
  gzip_comp_level 6;
  gzip_types text/css application/javascript text/javascript application/json image/svg+xml text/plain application/manifest+json;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Sitio no listado: solo entra quien tiene el link, nada de buscadores
  add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

  # admin.html nunca debe indexarse ni cachearse agresivo
  location = /admin.html {
    add_header X-Robots-Tag "noindex, nofollow" always;
    try_files $uri =404;
  }

  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location /dist/ {
    expires 365d;
    add_header Cache-Control "public, immutable";
  }

  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # Sitio de una sola pagina (secciones con #anchor, sin rutas de cliente
  # reales) - sin fallback SPA, URLs inexistentes devuelven 404 real.
  location / {
    try_files $uri $uri/ =404;
  }
}
