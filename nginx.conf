map $http_origin $cors_allow_origin {
  default "";
  "~^https://catalogo\.manekistore\.com\.mx$" $http_origin;
  "~^https://bicho\.manekistore\.com\.mx$" $http_origin;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 512;
  gzip_comp_level 6;
  gzip_types text/css application/javascript text/javascript application/json image/svg+xml text/plain application/manifest+json;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-site" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://hoqcrljgmamaumtdrtzi.supabase.co; connect-src 'self' https://hoqcrljgmamaumtdrtzi.supabase.co https://*.supabase.co wss://*.supabase.co https://wa.me https://api.whatsapp.com; worker-src 'self'; manifest-src 'self'; upgrade-insecure-requests" always;
  add_header Access-Control-Allow-Origin $cors_allow_origin always;
  add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey" always;
  add_header Access-Control-Max-Age "86400" always;
  add_header Vary "Origin" always;

  if ($request_method = OPTIONS) {
    return 204;
  }

  # admin.html nunca debe indexarse ni cachearse agresivo.
  location = /admin.html {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://hoqcrljgmamaumtdrtzi.supabase.co; connect-src 'self' https://hoqcrljgmamaumtdrtzi.supabase.co https://*.supabase.co wss://*.supabase.co https://wa.me https://api.whatsapp.com; worker-src 'self'; manifest-src 'self'; upgrade-insecure-requests" always;
    add_header Access-Control-Allow-Origin $cors_allow_origin always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey" always;
    add_header Access-Control-Max-Age "86400" always;
    add_header Vary "Origin" always;
    add_header Cache-Control "no-store, max-age=0" always;
    try_files $uri =404;
  }

  location /assets/ {
    expires 30d;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Access-Control-Allow-Origin $cors_allow_origin always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey" always;
    add_header Access-Control-Max-Age "86400" always;
    add_header Vary "Origin" always;
    add_header Cache-Control "public, immutable";
  }

  location /dist/ {
    expires 365d;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Access-Control-Allow-Origin $cors_allow_origin always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey" always;
    add_header Access-Control-Max-Age "86400" always;
    add_header Vary "Origin" always;
    add_header Cache-Control "public, immutable";
  }

  location = /sw.js {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Access-Control-Allow-Origin $cors_allow_origin always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey" always;
    add_header Access-Control-Max-Age "86400" always;
    add_header Vary "Origin" always;
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  # Sitio de una sola pagina: sin fallback SPA; URLs inexistentes devuelven 404 real.
  location / {
    try_files $uri $uri/ =404;
  }
}
