server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # admin.html nunca debe indexarse ni cachearse agresivo
  location = /admin.html {
    add_header X-Robots-Tag "noindex, nofollow" always;
    try_files $uri =404;
  }

  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
